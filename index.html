<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice & Oracle — a GM's companion</title>
<meta name="description" content="A tabletop dice roller and oracle: full polyhedral set, advantage rolls, a yes/no oracle, and random tables.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0908;--panel:#13100f;--panel2:#1b1614;--ink:#cabfa8;--dim:#6d6253;
    --accent:#8a1c1c;--blood:#a82323;--ember:#c0561f;--arc:#5a4a6e;--gold:#9a7b35;--bone:#d8cdb4;
    --line:rgba(202,191,168,.09);--mono:'JetBrains Mono',monospace;--serif:'EB Garamond',Georgia,serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:
      radial-gradient(ellipse 70% 45% at 50% -5%,rgba(192,86,31,.10),transparent 70%),
      radial-gradient(ellipse 90% 60% at 50% 120%,rgba(138,28,28,.10),transparent 70%),
      var(--bg);
    color:var(--ink);font-family:var(--serif);font-size:17px;min-height:100vh;padding:2rem 1rem}
  /* vignette + faint grain */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    box-shadow:inset 0 0 220px 60px rgba(0,0,0,.85);
    background-image:radial-gradient(circle,rgba(202,191,168,.022) 1px,transparent 1px);background-size:3px 3px}
  .wrap{position:relative;z-index:1;max-width:880px;margin:0 auto}
  header{text-align:center;margin-bottom:1.9rem}
  .eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.4em;text-transform:uppercase;color:var(--blood);margin-bottom:.6rem;opacity:.85}
  h1{font-family:'Cinzel',serif;font-weight:900;font-size:2.3rem;letter-spacing:.02em;color:var(--bone);
    text-shadow:0 2px 18px rgba(168,35,35,.25)}
  .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:1.25rem}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel),#100d0c);border:1px solid var(--line);
    padding:1.4rem;box-shadow:0 1px 0 rgba(202,191,168,.04) inset, 0 10px 40px rgba(0,0,0,.5)}
  .card h2{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;margin-bottom:1.1rem;color:var(--bone);
    display:flex;align-items:center;gap:.6rem;letter-spacing:.02em}
  .card h2::before{content:'';width:7px;height:7px;background:var(--blood);transform:rotate(45deg);
    box-shadow:0 0 10px rgba(168,35,35,.6)}

  .dice-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
  .die{font-family:var(--mono);font-size:.85rem;font-weight:700;padding:.55rem .7rem;cursor:pointer;
    border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:all .15s;min-width:48px}
  .die:hover{border-color:var(--blood);color:var(--bone);transform:translateY(-2px);box-shadow:0 4px 14px rgba(138,28,28,.3)}
  .opts{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:1rem}
  .opt{display:flex;flex-direction:column;gap:.3rem}
  .opt label{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
  .opt input{font-family:var(--mono);width:64px;background:#0a0807;border:1px solid var(--line);
    color:var(--bone);text-align:center;padding:.45rem}
  .opt input:focus{outline:none;border-color:var(--blood)}
  .adv{display:flex;gap:.3rem}
  .adv button{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;
    padding:.45rem .55rem;cursor:pointer;border:1px solid var(--line);background:#0a0807;color:var(--dim)}
  .adv button.on{border-color:var(--blood);color:var(--blood)}

  .result{text-align:center;padding:1.4rem 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:1rem}
  .result .total{font-family:'Cinzel',serif;font-size:3.6rem;font-weight:900;line-height:1;color:var(--bone);
    text-shadow:0 0 26px rgba(154,123,53,.4)}
  .result .total.crit{color:var(--gold);text-shadow:0 0 30px rgba(154,123,53,.7)}
  .result .total.fail{color:var(--blood);text-shadow:0 0 30px rgba(168,35,35,.7)}
  .result .break{font-family:var(--mono);font-size:.74rem;color:var(--dim);margin-top:.7rem;word-break:break-word}
  .result .crit-tag{color:var(--gold);font-weight:700;letter-spacing:.12em}
  .result .fail-tag{color:var(--blood);font-weight:700;letter-spacing:.12em}

  .quick{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
  .quick button{font-family:var(--mono);font-size:.66rem;padding:.4rem .6rem;cursor:pointer;
    border:1px dashed var(--line);background:none;color:var(--dim);transition:all .15s}
  .quick button:hover{border-color:var(--ember);color:var(--ember)}

  .log{font-family:var(--mono);font-size:.7rem;color:var(--dim);max-height:120px;overflow:auto;line-height:1.7;border-top:1px solid var(--line);padding-top:.6rem}
  .log b{color:var(--bone)}

  /* Oracle */
  .oracle-btn{width:100%;font-family:'Cinzel',serif;font-weight:700;font-size:1rem;letter-spacing:.04em;
    padding:1rem;cursor:pointer;border:1px solid var(--blood);color:var(--bone);transition:all .25s;margin-bottom:.75rem;
    background:linear-gradient(180deg,rgba(138,28,28,.22),rgba(138,28,28,.06))}
  .oracle-btn:hover{background:linear-gradient(180deg,rgba(168,35,35,.4),rgba(138,28,28,.15));
    box-shadow:0 0 26px rgba(168,35,35,.3)}
  .odds{width:100%;font-family:var(--mono);font-size:.74rem;background:#0a0807;border:1px solid var(--line);color:var(--ink);padding:.55rem;margin-bottom:1rem}
  .answer{text-align:center;font-family:'Cinzel',serif;font-size:1.65rem;font-weight:700;min-height:2rem;margin-bottom:.4rem;color:var(--bone)}
  .answer.yes{color:var(--gold)}.answer.no{color:var(--blood)}.answer.maybe{color:var(--ember)}
  .answer-sub{text-align:center;font-family:var(--mono);font-size:.7rem;color:var(--dim);margin-bottom:1.25rem;min-height:1rem;font-style:italic}
  .answer-sub{font-style:normal}

  .tables{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.9rem}
  .tables button{font-family:var(--mono);font-size:.66rem;padding:.45rem .6rem;cursor:pointer;
    border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:all .15s}
  .tables button:hover{border-color:var(--gold);color:var(--gold)}
  .draw{min-height:2.4rem;font-size:1.02rem;line-height:1.65;color:var(--bone);font-style:italic;
    border-left:2px solid var(--blood);padding:.5rem 0 .5rem .9rem}
  .draw .src{display:block;font-family:var(--mono);font-style:normal;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:.35rem}
  footer{text-align:center;margin-top:1.9rem;color:var(--dim);font-family:var(--mono);font-size:.68rem}
  footer a{color:var(--blood);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Bones &amp; the Black Oracle</p>
    <h1>Cast the Bones, Heed the Dark</h1>
  </header>

  <div class="grid">
    <!-- DICE -->
    <section class="card">
      <h2>The Bone Tray</h2>
      <div class="dice-row" id="diceRow"></div>
      <div class="opts">
        <div class="opt"><label>Quantity</label><input type="number" id="qty" min="1" max="100" value="1"></div>
        <div class="opt"><label>Modifier</label><input type="number" id="mod" value="0"></div>
        <div class="opt"><label>d20 roll</label>
          <div class="adv">
            <button data-adv="0" class="on">flat</button>
            <button data-adv="1">adv</button>
            <button data-adv="-1">dis</button>
          </div>
        </div>
      </div>
      <div class="result">
        <div class="total" id="total">—</div>
        <div class="break" id="break">cast a bone, or call a swift fate below</div>
      </div>
      <div class="quick">
        <button data-roll="1d20">d20</button>
        <button data-roll="2d6">2d6</button>
        <button data-roll="3d6">3d6</button>
        <button data-roll="4d6dl1">4d6 drop low</button>
        <button data-roll="1d100">d100</button>
        <button data-roll="2d20kh1">d20 adv</button>
        <button data-roll="8d6">fireball (8d6)</button>
      </div>
      <div class="log" id="log"></div>
    </section>

    <!-- ORACLE -->
    <section class="card">
      <h2>The Black Oracle</h2>
      <select class="odds" id="odds">
        <option value="0.1">A fool's hope</option>
        <option value="0.25">Doubtful</option>
        <option value="0.5" selected>The coin spins</option>
        <option value="0.75">Likely</option>
        <option value="0.9">All but certain</option>
      </select>
      <button class="oracle-btn" id="ask">Cast your question into the dark →</button>
      <div class="answer" id="answer"></div>
      <div class="answer-sub" id="answerSub"></div>

      <h2 style="margin-top:.5rem">Omens &amp; Auguries</h2>
      <div class="tables" id="tables"></div>
      <div class="draw" id="draw"><span class="src">the lots lie still</span>Choose an augury above.</div>
    </section>
  </div>

  <footer>An afternoon toy by <a href="https://damienbuilds.dev" target="_blank" rel="noopener">damienbuilds.dev</a></footer>
</div>

<script>
const $=id=>document.getElementById(id);
const rnd=n=>Math.floor(Math.random()*n)+1;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const DICE=[4,6,8,10,12,20,100];
let advMode=0;

// build die buttons
$('diceRow').innerHTML=DICE.map(d=>`<button class="die" data-d="${d}">d${d}</button>`).join('');
$('diceRow').onclick=e=>{ const b=e.target.closest('.die'); if(b) roll(+b.dataset.d,+$('qty').value,+$('mod').value); };

// advantage toggle
document.querySelectorAll('.adv button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.adv button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); advMode=+b.dataset.adv;
});

function show(total,breakdown,faces,sides,count){
  const el=$('total'); el.textContent=total; el.className='total';
  let tag='';
  if(sides===20 && count===1){
    if(faces[0]===20){ el.classList.add('crit'); tag=' <span class="crit-tag">— THE FATES SMILE</span>'; }
    if(faces[0]===1){ el.classList.add('fail'); tag=' <span class="fail-tag">— THE FATES SCORN</span>'; }
  }
  $('break').innerHTML=breakdown+tag;
  const log=$('log'); const e=document.createElement('div');
  e.innerHTML=`<b>${total}</b> &nbsp;<span style="opacity:.7">${breakdown}</span>`;
  log.prepend(e); while(log.childNodes.length>14) log.removeChild(log.lastChild);
}

function roll(sides,qty,mod){
  qty=Math.max(1,Math.min(100,qty||1)); mod=mod||0;
  let faces=[];
  if(sides===20 && qty===1 && advMode!==0){
    const a=rnd(20),b=rnd(20); const keep=advMode>0?Math.max(a,b):Math.min(a,b);
    faces=[keep];
    const total=keep+mod;
    show(total,`d20(${advMode>0?'adv':'dis'}) [${a}, ${b}] keep ${keep}${mod?` ${mod>0?'+':''}${mod}`:''}`,faces,20,1);
    return;
  }
  for(let i=0;i<qty;i++) faces.push(rnd(sides));
  const sum=faces.reduce((a,b)=>a+b,0)+mod;
  const fstr=qty>1?`[${faces.join(', ')}]`:`[${faces[0]}]`;
  show(sum,`${qty}d${sides} ${fstr}${mod?` ${mod>0?'+':''}${mod}`:''}`,faces,sides,qty);
}

// quick rolls (mini dice-notation)
document.querySelector('.quick').onclick=e=>{
  const b=e.target.closest('button'); if(!b) return;
  const n=b.dataset.roll;
  if(n==='4d6dl1'){ const f=[rnd(6),rnd(6),rnd(6),rnd(6)].sort((a,b)=>a-b);
    const kept=f.slice(1); show(kept.reduce((a,b)=>a+b,0),`4d6 [${f.join(', ')}] drop ${f[0]}`,kept,6,3); return; }
  if(n==='2d20kh1'){ const a=rnd(20),c=rnd(20),keep=Math.max(a,c);
    show(keep,`d20(adv) [${a}, ${c}] keep ${keep}`,[keep],20,1); return; }
  const m=n.match(/(\d+)d(\d+)/); if(m) roll(+m[2],+m[1],0);
};

// ── Oracle ──
$('ask').onclick=()=>{
  const odds=+$('odds').value, r=Math.random();
  const ans=$('answer'), sub=$('answerSub');
  const roll=rnd(20);
  let yes=r<odds;
  // exceptional results
  let text=yes?'Yes':'No', cls=yes?'yes':'no', extra='';
  if(roll===20){ text='Yes, and…'; cls='yes'; extra='fortune turns sharply in your favour'; }
  else if(roll===1){ text='No, and…'; cls='no'; extra='and it festers worse than you feared'; }
  else if(yes && roll>=17){ text='Yes, and…'; extra='with a gift you did not ask for'; }
  else if(!yes && roll<=4){ text='No, but…'; cls='maybe'; extra='a small mercy is left to you'; }
  else if(yes && roll<=4){ text='Yes, but…'; cls='maybe'; extra='the price will come due'; }
  else extra=pick(['so it is written in ash','the bones do not lie','the dark has spoken','the omens hold','as the old ones foretold']);
  ans.className='answer '+cls; ans.textContent=text;
  sub.textContent='☽ the oracle die shows '+roll+' · '+extra;
};

// ── Random tables ──
const TABLES={
  "NPC name":["Bram Hollowatch","Sister Veil","Old Tussock","Marisha Qu11","Edrik the Lesser","Goodwife Penn","Cael Underbough","Mother Sorrel","Tobias Grime","Lady Ashfen","Pol the Tinker","Henrietta Vane"],
  "Tavern":["The Drowned Rat","The Gilded Sow","The Last Lantern","The Broken Compass","The Salt & Sorrow","The Tipsy Lich","The Hearth & Hound","The Mended Mug","The Crooked Crown","The Weeping Widow"],
  "Encounter":["A merchant whose cart has thrown a wheel — and he's lying about the cargo.","Three goblins arguing over a map they can't read.","A bridge troll who only wants someone to talk to.","A wounded knight begging you to finish her quest.","Bandits, but they're terrible at it.","A talking raven repeating a dead man's last words.","A pilgrim heading the wrong way, cheerfully.","Wolves circling — or are they being herded?"],
  "Loot":["A ring that hums near untruths.","47 silver, a love letter, and a tooth.","A map to somewhere that no longer exists.","A vial of something that should not glow.","A finely-made dagger with a stranger's initials.","Three keys, two locks, one regret.","A spellbook missing its most important page.","A coin that always lands on its edge."],
  "Plot hook":["The village's children have all dreamed the same dream.","A noble pays triple to deliver a sealed box — unopened, by dawn.","The well water has started running backwards.","A rival adventuring party has gone silent in the deeps.","Someone is selling memories that aren't theirs.","The dead are politely refusing to stay buried.","A star fell, and something climbed out of the crater."],
  "Omen":["Birds wheel widdershins over the keep.","Milk soured in every pail before noon.","The candles all gutter toward the door.","A bell tolls with no hand to ring it.","Your shadow is a half-step slow today.","Salt spilled itself across the threshold."]
};
$('tables').innerHTML=Object.keys(TABLES).map(t=>`<button data-t="${t}">${t}</button>`).join('');
$('tables').onclick=e=>{ const b=e.target.closest('button'); if(!b) return;
  const t=b.dataset.t;
  $('draw').innerHTML=`<span class="src">${t}</span>${pick(TABLES[t])}`;
};

// keyboard: R re-rolls last quick d20
document.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R') roll(20,1,+$('mod').value); });
</script>
</body>
</html>
